<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckWord — Le Défi des Mots</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;600;700;900&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
   
    <link id="theme-css" rel="stylesheet" href="./css/style1.css">

   
</head>
<body>
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>

    <div class="page-wrap">
        <div class="title-card">
            <div class="logo-emblem">
                <img src="./image/logo.png" alt="CheckWord">
            </div>
            <h1 class="game-title">CheckWord</h1>
            <div class="title-divider">
                <span></span>
                <span class="fleur">⚜</span>
                <span></span>
            </div>
            <p class="title-sub">Le Défi des Mots Cachés</p>
        </div>

        <div class="panel">
            <div class="ornament tl"></div>
            <div class="ornament tr"></div>
            <div class="ornament bl"></div>
            <div class="ornament br"></div>

            <div class="scene-frame">
                 <img id="scene-img" src="./image/plan1.png" alt="Scène du jeu">
            </div>

            <div class="level-badge">
                <span class="badge-icon">🏆</span>
                <span>Niveau</span>
                <span class="level-num" id="levelNum">1</span>
            </div>

            <br>

            <!-- CONTENEUR DES BOUTONS -->
            <div style="display: flex; flex-direction: column; gap: 15px; width: 100%; align-items: center;">
                
                <!-- Bouton Solo -->
                <button class="btn-start" id="startBtn">
                    <span class="btn-icon">⚔️</span>
                     Solo
                </button>

                <!-- Bouton Multijoueur -->
                <button class="btn-start" id="multiBtn" style="background: linear-gradient(45deg, #8b0000, #4a0000); border-color: #ff4444;">
                    <span class="btn-icon">👑</span>
                    Multijoueur
                </button>

                <!-- Bouton Thèmes -->
                <button class="btn-start" id="themeBtn" style="background: linear-gradient(45deg, #004b8b, #001a4a); border-color: #44aaff;">
                    <span class="btn-icon">🎨</span>
                    Thèmes
                </button>

            </div>

            <div class="panel-footer" style="margin-top: 20px;">« Chaque mot révélé, une victoire de plus »</div>
        </div>
    </div>
 <script>
         function updateTheme() {
        let level = 1;
         let themeNum = 1;
        if (localStorage.getItem('player')) {
            level = JSON.parse(localStorage.getItem('player')).level || 1;
        }
        
        // Calcule le palier (de 1 à 8)
         if (localStorage.getItem('player') !=undefined) {
        themeNum = JSON.parse(localStorage.getItem('player')).selectedTheme || 1;
         }
        // Bloque au 8ème thème maximum (pour les niveaux 351 et plus)
        if (themeNum > 8) {
            themeNum = 8; 
        }
        
     
        
        // Modifie le fichier CSS (Si suffix est vide, ça donnera "game.css")
        document.getElementById('theme-css').href = "./css/style" + themeNum+ ".css";
        const sceneImg = document.getElementById('scene-img');
                if(sceneImg) {
                    sceneImg.src = "./image/plan" + themeNum + ".png"; // Donnera plan1.png, plan2.png, etc.
                }
            };
    
    
    // Exécute la fonction immédiatement
    updateTheme();

        // Gestion de la version et du niveau
        const GAME_VERSION = "2.0"; 
        if (localStorage.getItem('game_version') !== '2.0') {
            localStorage.removeItem('player'); 
            localStorage.setItem('game_version', '2.0'); 
            let player = { level: 1 };
            localStorage.setItem('player', JSON.stringify(player));
        }

        const levelNum = document.getElementById('levelNum');
        if (localStorage.getItem('player')) {
            const player = JSON.parse(localStorage.getItem('player'));
            levelNum.textContent = player.level;
        }

        // Redirections des boutons
        document.getElementById('startBtn').addEventListener('click', function() {
            window.location = './html/game.html';
        });

        document.getElementById('multiBtn').addEventListener('click', function() {
            window.location = './html/challenge.html';
        });

        document.getElementById('themeBtn').addEventListener('click', function() {
            window.location = './html/theme.html';
        });
       
    </script>
</body>
</html>
